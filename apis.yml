aid: intrinsic-ai
name: Intrinsic
description: >-
  Intrinsic is a Mountain View, California industrial robotics software company
  spun out of Alphabet's X "moonshot factory" and led by CEO Wendy Tan White.
  Its mission is to make industrial robots radically easier to program, use,
  and innovate with so that automation is accessible to a much broader range
  of businesses. Intrinsic's flagship product is Intrinsic Flowstate, an
  all-in-one web-based developer environment for designing, building,
  simulating, and deploying production-grade robotics solutions, paired with
  Intrinsic Intelligence — a portfolio of AI-powered capabilities including
  pose estimation, motion planning, grasp planning, and sensor-guided control
  — and IntrinsicOS, a robot operating system that spans cloud to edge.
  Developers extend Flowstate by writing Skills and Services in Python and
  C++ via the open-source Intrinsic SDK (Apache-2.0), or compose them
  visually via behavior trees in the Flowstate Process Editor. The platform
  integrates deeply with ROS through Intrinsic's 2022 acquisition of Open
  Source Robotics Corporation (OSRC) — the commercial arm of Open Robotics —
  while ROS, Gazebo, and Open-RMF stewardship remain with the independent
  OSRF non-profit. Flowstate is currently in a gated beta / trusted-tester
  program; production access is granted to enterprise customers, systems
  integrators, and participants in programs such as the AI for Industry
  Challenge. Pricing is not publicly disclosed and there is no self-service
  developer signup.
